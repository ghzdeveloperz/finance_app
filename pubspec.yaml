name: finance_app
description: Personal finance app built with Flutter, Supabase and Clean Architecture
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  supabase_flutter: ^2.5.6
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.0.5
  intl: ^0.19.0

  # UI / UX
  flutter_svg: ^2.0.10+1

  # Icons + Splash
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

# 🔥 CONFIG ÍCONE DO APP
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo_light.png"

# 🔥 CONFIG SPLASH SCREEN
flutter_native_splash:
  color: "#000000"
  image: assets/images/logo_dark.png
  android_12:
    image: assets/images/logo_dark.png
    color: "#000000"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/lottie/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/Inter_18pt-Bold.ttf
          weight: 700